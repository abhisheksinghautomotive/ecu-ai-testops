name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('simulator/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install dependencies
        run: |
          pip install ruff mypy pandas-stubs types-PyYAML
          pip install -r simulator/requirements.txt
          if [ -f "test_runner/requirements.txt" ]; then pip install -r test_runner/requirements.txt; fi
          if [ -f "anomaly_detector/requirements.txt" ]; then pip install -r anomaly_detector/requirements.txt; fi

      - name: Run Ruff linter
        run: ruff check simulator/ test_runner/ anomaly_detector/ tests/

      - name: Run MyPy type checker
        run: mypy simulator/ test_runner/ anomaly_detector/ --ignore-missing-imports

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('simulator/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install -r simulator/requirements.txt
          if [ -f "test_runner/requirements.txt" ]; then pip install -r test_runner/requirements.txt; fi
          if [ -f "anomaly_detector/requirements.txt" ]; then pip install -r anomaly_detector/requirements.txt; fi
          pip install -e .

      - name: Run tests with coverage
        run: >
          pytest tests/ -v
          --cov=simulator --cov=test_runner --cov=anomaly_detector
          --cov-report=term-missing
          --cov-fail-under=80

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: simulator/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/simulator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
