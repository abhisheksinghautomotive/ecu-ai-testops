services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # This job simply runs once to set up the two buckets we need
  minio_setup:
    image: minio/mc:latest
    container_name: minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/model-artifacts --ignore-existing;
      /usr/bin/mc mb myminio/reports --ignore-existing;
      /usr/bin/mc policy set public myminio/model-artifacts;
      /usr/bin/mc policy set public myminio/reports;
      exit 0;
      "

volumes:
  minio_data:
